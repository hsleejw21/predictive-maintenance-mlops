name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package + dev/serving deps
        run: pip install -e ".[dev,serving]"

      - name: Lint (ruff)
        run: ruff check .

      - name: Generate model registry (CLI smoke + enables API tests)
        run: python scripts/run_pipeline.py

      - name: Test (pytest)
        run: pytest

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build image (pinned deps + baked model)
        run: docker build -t pdm-mlops:ci .

      - name: Smoke-test API container
        run: |
          docker run -d --name pdm-api -p 8000:8000 pdm-mlops:ci \
            uvicorn pdm.serving.api:app --host 0.0.0.0 --port 8000
          for i in $(seq 1 20); do
            code=$(curl -s -o /dev/null -w '%{http_code}' http://localhost:8000/health || true)
            [ "$code" = "200" ] && break || sleep 2
          done
          curl -sf http://localhost:8000/health | grep -q '"model_available":true'
          docker rm -f pdm-api
